<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CF Exam Dojo — Corporate Finance</title>
<style>
:root{
  --bg:#160f1c; --bg2:#1d1422; --card:#221727; --card2:#2b1d31; --line:#3a2740;
  --tx:#f4e9f0; --tx2:#c79bb4; --tx3:#946b85; --acc:#fb7185; --acc2:#fbbf24;
  --good:#4ade80; --bad:#f87171; --warn:#fbbf24; --chip:#3a2740;
  --grad:linear-gradient(135deg,#fb7185,#fb923c 55%,#fbbf24); --ontx:#2a0e16;
  --sh1:0 1px 2px rgba(0,0,0,.45); --sh2:0 10px 34px rgba(0,0,0,.4);
  --r:16px; --r2:12px; --sp:16px; --maxw:1040px;
}
:root[data-theme="light"]{
  --bg:#fdf4f7; --bg2:#f8eaf0; --card:#ffffff; --card2:#fdf3f7; --line:#f0d9e4;
  --tx:#3a1626; --tx2:#8a5a73; --tx3:#b08aa0; --chip:#fbe4ee;
  --good:#15803d; --bad:#dc2626; --warn:#b45309; --ontx:#2a0e16;
  --sh1:0 1px 2px rgba(120,40,80,.12); --sh2:0 10px 30px rgba(150,60,100,.15);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--acc);text-decoration:none}
.skip{position:absolute;left:-999px;top:0;background:var(--acc);color:#fff;padding:8px 14px;border-radius:0 0 8px 0;z-index:100}
.skip:focus{left:0}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--sp)}
header.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topin{display:flex;align-items:center;gap:14px;height:60px;max-width:var(--maxw);margin:0 auto;padding:0 var(--sp)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
.mark{width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center;color:var(--ontx);font-weight:800;box-shadow:var(--sh1)}
.tabs{display:flex;gap:4px;margin-left:auto}
.tabs a{color:var(--tx2);padding:8px 12px;border-radius:10px;font-weight:600;font-size:14px}
.tabs a.on{color:var(--tx);background:var(--card)}
.tabs a:hover{color:var(--tx)}
.iconbtn{background:var(--card);border:1px solid var(--line);color:var(--tx2);width:38px;height:38px;border-radius:10px;cursor:pointer;display:grid;place-items:center}
.iconbtn:hover{color:var(--tx)}
main{padding:22px 0 96px}
h1{font-size:26px;margin:.2em 0 .4em}
h2{font-size:19px;margin:1.2em 0 .5em}
h3{font-size:15px;margin:1em 0 .4em;color:var(--tx2)}
.muted{color:var(--tx2)}
.dim{color:var(--tx3)}
.grid{display:grid;gap:var(--sp)}
.cards{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh1)}
.card.lift{transition:transform .15s ease,box-shadow .15s ease;cursor:pointer}
.card.lift:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.btn{background:var(--card2);color:var(--tx);border:1px solid var(--line);padding:9px 15px;border-radius:11px;font-weight:600;cursor:pointer;font-size:14px}
.btn:hover{border-color:var(--acc)}
.btn.primary{background:var(--grad);border:none;color:var(--ontx);box-shadow:var(--sh1)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 11px;font-size:13px}
.chip{display:inline-block;background:var(--chip);color:var(--tx2);padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600}
.chip.s{background:transparent;border:1px solid var(--line)}
input,select,textarea{font:inherit;color:var(--tx);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
input:focus,textarea:focus,select:focus,.btn:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;flex-wrap:wrap}
.seg button{background:transparent;border:none;color:var(--tx2);padding:7px 13px;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px}
.seg button.on{background:var(--card);color:var(--tx);box-shadow:var(--sh1)}
.bar{height:9px;background:var(--bg2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:var(--grad)}
table.dt{border-collapse:collapse;width:100%;font-size:13.5px}
table.dt th,table.dt td{border:1px solid var(--line);padding:6px 9px;text-align:right}
table.dt th:first-child,table.dt td:first-child{text-align:left;color:var(--tx2)}
table.dt th{background:var(--bg2);font-weight:600}
code{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:13px;color:var(--tx)}
.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 .15em}
.frac>span:first-child{border-bottom:1.5px solid currentColor;padding:0 .35em}
.frac>span:last-child{padding:0 .35em}
.formula{font-size:16px;line-height:2}
.fbox{background:color-mix(in srgb,var(--acc) 6%,var(--card2));border:1px solid color-mix(in srgb,var(--acc) 18%,var(--line));border-radius:var(--r2);padding:11px 15px;margin:6px 0}
.fbox.crit{border-color:var(--acc);border-left:3px solid var(--acc)}
.fbox .fnm{font-size:12.5px;font-weight:700;color:var(--tx2);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.fbox .fexpr{font-size:17px;line-height:2.3}
.fbox .fwhen{font-size:12.5px;color:var(--tx2);border-top:1px solid color-mix(in srgb,var(--line) 70%,transparent);padding-top:7px;margin-top:7px}
.worked-box{background:color-mix(in srgb,var(--acc2) 7%,var(--card2));border:1px solid color-mix(in srgb,var(--acc2) 22%,var(--line));border-left:3px solid var(--acc2);border-radius:0 var(--r2) var(--r2) 0;padding:14px 16px;margin:4px 0}
.worked-hdr{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--acc2);margin-bottom:10px}
.worked-body{font-size:14px;line-height:1.75}
.worked-body b{color:var(--tx)}
.pitfall-item{display:flex;gap:9px;align-items:flex-start;padding:8px 12px;background:color-mix(in srgb,var(--bad) 7%,var(--card2));border:1px solid color-mix(in srgb,var(--bad) 18%,var(--line));border-radius:10px;font-size:13.5px;margin:4px 0}
.exam-item{display:flex;gap:9px;align-items:flex-start;padding:8px 12px;background:color-mix(in srgb,var(--good) 7%,var(--card2));border:1px solid color-mix(in srgb,var(--good) 18%,var(--line));border-radius:10px;font-size:13.5px;margin:4px 0}
.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}
.pill{padding:2px 8px;border-radius:8px;font-size:12px;font-weight:700}
.pill.g{background:color-mix(in srgb,var(--good) 22%,transparent);color:var(--good)}
.pill.b{background:color-mix(in srgb,var(--bad) 22%,transparent);color:var(--bad)}
.opt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0;cursor:pointer;color:var(--tx)}
.opt:hover{border-color:var(--acc)}
.opt.correct{border-color:var(--good);background:color-mix(in srgb,var(--good) 12%,var(--card2))}
.opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 12%,var(--card2))}
.why{font-size:13px;color:var(--tx2);margin-top:6px;display:none}
.opt.reveal .why{display:block}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);padding:10px 16px;border-radius:12px;box-shadow:var(--sh2);z-index:80;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.bignum{font-size:40px;font-weight:800;line-height:1}
.legend span{display:inline-block;margin:2px 10px 2px 0;font-size:12.5px;color:var(--tx2)}
.kbd{border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:12px;background:var(--bg2)}
.foot{max-width:var(--maxw);margin:24px auto 0;padding:18px var(--sp) 28px;border-top:1px solid var(--line);color:var(--tx3);font-size:13px;text-align:center}
.foot a{color:var(--tx2)}
nav.bottom{display:none}
@media(max-width:680px){
  .tabs{display:none}
  nav.bottom{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);z-index:40;padding:6px 4px 10px}
  nav.bottom a{flex:1;text-align:center;color:var(--tx3);font-size:11px;font-weight:600;padding:4px;border-radius:8px}
  nav.bottom a.on{color:var(--acc)}
  nav.bottom a span{display:block;font-size:18px;line-height:1.2}
  .foot{padding-bottom:84px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.sheetcols{column-count:2;column-gap:18px}
.sheetitem{break-inside:avoid;margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:6px}
#sheetgrid{align-items:start}
@media(max-width:680px){#sheetgrid{grid-template-columns:1fr!important}}
@media print{
  header.top,nav.bottom,.tabs,.iconbtn{display:none!important}
  body *{visibility:hidden}
  #printsheet,#printsheet *{visibility:visible}
  #printsheet{position:absolute;left:0;top:0;width:100%;color:#000}
  #printsheet .sheetcols{column-count:2}
  #printsheet .formula{font-size:13px}
}
</style>

<header class="top">
  <div class="topin">
    <a class="brand" href="#/home"><span class="mark">CF</span><span>Exam Dojo</span></a>

  </div>
</header>
<main><div class="wrap" id="app" tabindex="-1"></div></main>
<footer class="foot"><a href="#/stats">Stats &amp; calibration</a> · <a href="#/sheet">Cheat sheet</a> · <a href="#/selftest">Self-test</a> · <span class="dim">CF Exam Dojo — offline, private to this device</span></footer>

<script>
"use strict";
/* ===================================================================
   CF EXAM DOJO — single-file, offline. (Phase 0 foundation build.)
   =================================================================== */
const App = (() => {

/* ---------- PRNG ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
const rng=(seed)=>mulberry32(typeof seed==="number"?seed:hashStr(String(seed)));
const ri=(r,lo,hi)=>lo+Math.floor(r()*(hi-lo+1));
const rf=(r,lo,hi,dp=2)=>{const v=lo+r()*(hi-lo);const m=10**dp;return Math.round(v*m)/m;};
const pick=(r,arr)=>arr[Math.floor(r()*arr.length)];

/* ---------- CFMath (verified: 45/45 self-tests) ---------- */
const CFMath=(()=>{
  const r2=x=>Math.round(x*100)/100;
  const ebitda=(s,c,o)=>s*(1-c-o);
  const nwc=(ar,inv,ap)=>ar+inv-ap;
  const ppeRoll=(p,capx,dep)=>p+capx-dep;
  const fcf=(ebit,t,dep,capx,d)=>(1-t)*ebit+dep-capx-d;
  const fcfFromEbitda=(e,t,dep,capx,d)=>(1-t)*e+t*dep-capx-d;
  const taxOnSale=(s,b,t)=>t*(s-b);
  const liquidation=(s,b,t)=>s-taxOnSale(s,b,t);
  const payback=(cfs)=>{let cum=0;for(let i=0;i<cfs.length;i++){const p=cum;cum+=cfs[i];if(cum>=0&&i>0){return(i-1)+(-p)/cfs[i];}}return Infinity;};
  const npv=(cfs,rate)=>cfs.reduce((s,c,i)=>s+c/Math.pow(1+rate,i),0);
  const npvPerp=(inv,f1,r,g)=>-inv+f1/(r-g);
  const tvPerp=(f,r,g)=>(1+g)*f/(r-g);
  const pvTV=(tv,r,n)=>tv/Math.pow(1+r,n);
  const capm=(rf_,b,mrp)=>rf_+b*mrp;
  const wacc=(D,E,rD,rE,t)=>{const v=D+E;return(D/v)*rD*(1-t)+(E/v)*rE;};
  const waccW=(lev,rD,rE,t)=>lev*rD*(1-t)+(1-lev)*rE;
  const preTaxWacc=(lev,rD,rE)=>lev*rD+(1-lev)*rE;
  const netDebt=(d,c)=>d-c;
  const mktEquity=(p,s)=>p*s;
  const unlever=(bE,D,E,bD=0)=>{const v=D+E;return(E/v)*bE+(D/v)*bD;};
  const unleverSafe=(bE,dE)=>bE/(1+dE);
  const relever=(bA,dE,bD=0)=>bA+dE*(bA-bD);
  const evFromEquity=(e,d,c)=>e+d-c;
  const equityFromEV=(ev,c,d)=>ev+c-d;
  const sharePrice=(e,s)=>e/s;
  const eps=(ni,s)=>ni/s;
  const pe=(p,e)=>p/e;
  const peValue=(peer,tEPS)=>peer*tEPS;
  const evEbitda=(ev,e)=>ev/e;
  const evEbitdaValue=(m,te)=>m*te;
  const roe=(ni,be)=>ni/be;
  const roa=(ni,int,ba)=>(ni+int)/ba;
  const roic=(ebit,t,be,nd)=>ebit*(1-t)/(be+nd);
  const sustGrowth=(d,roeV)=>(1-d)*roeV;
  const assetGrowth=(a,ap)=>(a-ap)/ap;
  const dEquity=(ni,div,bb,iss)=>ni-div-bb+iss;
  const pvITS=(D,tau)=>tau*D;
  const leveredValue=(vU,D,tau)=>vU+tau*D;
  const leveredEquity=(vL,D)=>vL-D;
  const specialDivPrice=(ev,c,d,s,dps)=>sharePrice(equityFromEV(ev,c,d),s)-dps;
  const buybackPrice=(ev,c,d,s,amt)=>{const p=sharePrice(equityFromEV(ev,c,d),s);const sb=amt/p;return equityFromEV(ev,c-amt,d)/(s-sb);};
  const sharesIssued=(mc,p)=>mc/p;
  const combinedEPS=(eA,eB,sA,ns)=>(eA+eB)/(sA+ns);
  const dealPremium=(dp,u)=>(dp-u)/u;
  const issuancePrice=(N,Vm,add,raise)=>(Vm+add-raise)/N;
  const issuanceShares=(raise,p)=>raise/p;
  return {r2,ebitda,nwc,ppeRoll,fcf,fcfFromEbitda,taxOnSale,liquidation,payback,npv,npvPerp,tvPerp,pvTV,capm,wacc,waccW,preTaxWacc,netDebt,mktEquity,unlever,unleverSafe,relever,evFromEquity,equityFromEV,sharePrice,eps,pe,peValue,evEbitda,evEbitdaValue,roe,roa,roic,sustGrowth,assetGrowth,dEquity,pvITS,leveredValue,leveredEquity,specialDivPrice,buybackPrice,sharesIssued,combinedEPS,dealPremium,issuancePrice,issuanceShares};
})();

/* ---------- SelfTest ---------- */
const SelfTest=(()=>{
  const M=CFMath;const near=(g,w,t=0.02)=>Math.abs(g-w)<=t;const nearR=(g,w,r=0.005)=>Math.abs(g-w)<=Math.abs(w)*r+1e-9;
  function run(){const T=[];const ok=(n,g,w,t)=>T.push({name:n,pass:near(g,w,t),got:g,want:w});const okR=(n,g,w,r)=>T.push({name:n,pass:nearR(g,w,r),got:g,want:w});
    ok("EBITDA 200,50%,10%=80",M.ebitda(200,.5,.10),80);
    ok("NWC=94",M.nwc(211.5,23.5,141),94,.05);
    ok("PPE 10+1-0.5=10.5",M.ppeRoll(10,1,.5),10.5);
    ok("tax gain=10",M.taxOnSale(200,100,.10),10);
    ok("tax loss=-1",M.taxOnSale(60,70,.10),-1);
    ok("liquidation=1.14",M.liquidation(1.2,1,.30),1.14);
    ok("payback=2.5",M.payback([-20,10,5,10,5,10]),2.5,.001);
    ok("npvPerp=12.26",M.npvPerp(20,1,.041,.01),12.26,.02);
    ok("npvPerp QB=428.70",M.npvPerp(180,70,.135,.02),428.70,.1);
    ok("TV=2020",M.tvPerp(100,.06,.01),2020,.5);
    ok("TV Greenland=37.20",M.tvPerp(2,.0696,.015),37.20,.05);
    ok("pvTV=26.57",M.pvTV(37.20,.0696,5),26.57,.05);
    ok("CAPM=13.649",M.capm(4.7,1.57,5.7),13.649,.01);
    ok("CAPM=13.5",M.capm(3,1.5,7),13.5);
    okR("WACC Boeing=11.41",M.waccW(.26,6,13.65,.16),11.41,.01);
    ok("preTaxWACC=6",M.preTaxWacc(.5,4,8),6);
    ok("netDebt=190",M.netDebt(890,700),190);
    ok("unlever lev25%=1.5",M.unleverSafe(2,1/3),1.5);
    ok("unlever Orange=0.123",M.unleverSafe(.25,1.03),.123,.005);
    ok("relever bD0=4.5",M.relever(1.5,2,0),4.5);
    ok("relever bD.15=4.2",M.relever(1.5,2,.15),4.2);
    ok("relever neg=0.75",M.relever(1,-.25,0),.75);
    ok("equityFromEV=150",M.equityFromEV(200,50,100),150);
    ok("sharePrice=15",M.sharePrice(150,10),15);
    ok("EV=4990",M.evFromEquity(4800,890,700),4990,1);
    ok("PE=10",M.pe(10,1),10);
    ok("peValue=10",M.peValue(10,1),10);
    ok("ROE=6.38%",M.roe(14.3,224.2)*100,6.38,.02);
    ok("g*=3.19%",M.sustGrowth(.5,6.38),3.19,.02);
    ok("g* UST=36",M.sustGrowth(.64,100),36,.01);
    ok("assetGrowth=30.43%",M.assetGrowth(1500,1150)*100,30.43,.02);
    ok("dEquity=100",M.dEquity(200,120,30,50),100);
    ok("dEquity=250",M.dEquity(50,0,0,200),250);
    ok("PV ITS=100",M.pvITS(500,.20),100);
    ok("PV ITS=200",M.pvITS(1000,.20),200);
    ok("leveredV=1100",M.leveredValue(1000,500,.20),1100);
    ok("specialDiv=50",M.specialDivPrice(4000,2000,0,100,10),50,.01);
    ok("buyback=60",M.buybackPrice(4000,2000,0,100,1000),60,.01);
    ok("sharesIssued=50000",M.sharesIssued(2000000,40),50000,1);
    ok("combinedEPS=2.667",M.combinedEPS(200000,200000,100000,50000),2.667,.01);
    ok("premium=36.4%",M.dealPremium(12.10,8.87)*100,36.4,.1);
    ok("issuancePrice=14",M.issuancePrice(10,125,65,50),14,.01);
    ok("issuanceShares=3.571",M.issuanceShares(50,14),3.571,.01);
    const pass=T.filter(t=>t.pass).length;return{total:T.length,pass,fail:T.length-pass,tests:T};}
  return {run};
})();

/* ---------- Helpers ---------- */
const $=(s,el=document)=>el.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const frac=(a,b)=>`<span class="frac"><span>${a}</span><span>${b}</span></span>`;
function shuffled(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1800);}
function daysToExam(){const d=Store.get().examDate;if(!d)return null;const ex=new Date(d+"T00:00:00");const now=new Date();const a=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.round((ex-a)/864e5);}
function icon(n){const p={home:"M3 11l9-8 9 8M5 10v10h14V10",learn:"M4 5h16v14H4zM8 5v14",deck:"M4 7h13v13H4zM7 4h13v13",exam:"M6 3h9l3 3v15H6zM9 12h6M9 16h6",case:"M4 7h16v12H4zM9 7V5h6v2",mix:"M4 6h16M4 12h16M4 18h16",sheet:"M6 3h12v18H6zM9 8h6M9 12h6M9 16h4",star:"M12 3l3 6 6 .5-4.5 4 1.4 6L12 16l-5.3 3.5 1.4-6L3.6 9.5 9.6 9z"}[n]||"M12 12h.01";return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="${p}"/></svg>`;}

/* ---------- Store ---------- */
const KEY="cfdojo:v1", TKEY="cfdojo:theme";
const Store=(()=>{
  const def={schemaVersion:1,examDate:"2026-06-23",streak:0,lastActiveDay:null,topics:{},cards:{},attempts:[],mistakes:[],calib:{sure:{n:0,ok:0},unsure:{n:0,ok:0},guess:{n:0,ok:0}},reflections:[]};
  let state;
  try{const raw=localStorage.getItem(KEY);state=raw?Object.assign({},def,JSON.parse(raw)):Object.assign({},def);}
  catch(e){state=Object.assign({},def);}
  const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){toast("Couldn't save progress (storage full or private mode)");}};
  return {
    get:()=>state,
    update:(fn)=>{fn(state);save();},
    logAttempt:(topic,ok)=>{state.attempts.push({topic,ok,t:Date.now()});if(state.attempts.length>800)state.attempts=state.attempts.slice(-800);const td=state.topics[topic]||(state.topics[topic]={n:0,ok:0});td.n++;if(ok)td.ok++;save();},
    topicAcc:(topic)=>{const t=state.topics[topic];return t&&t.n?t.ok/t.n:0;},
    addMistake:(snap)=>{state.mistakes=state.mistakes.filter(m=>m.key!==snap.key);state.mistakes.push(snap);if(state.mistakes.length>200)state.mistakes=state.mistakes.slice(-200);save();},
    clearMistake:(key)=>{state.mistakes=state.mistakes.filter(m=>m.key!==key);save();},
    card:(id)=>state.cards[id],
    saveCard:(id,c)=>{state.cards[id]=c;save();},
    reset:()=>{state=Object.assign({},def);save();}
  };
})();

/* ---------- Spaced repetition (SM-2-lite, deadline-aware) ---------- */
const SR=(()=>{
  const DAY=864e5;
  function init(){return {ef:2.3,reps:0,interval:0,due:0,lapses:0,delayN:0,delayOK:0,last:0};}
  function capInterval(days){const d=daysToExam();if(d==null||d<=1)return Math.min(days,1);return Math.max(1,Math.min(days,Math.ceil(d*0.6)));}
  function grade(id,q){ // q: 0 Again,1 Hard,2 Good,3 Easy
    const c=Store.card(id)||init();const now=Date.now();
    const wasDelayed=c.last&&(now-c.last)>=DAY;
    if(wasDelayed){c.delayN++;if(q>=2)c.delayOK++;}
    if(q===0){c.reps=0;c.interval=0;c.lapses++;c.ef=Math.max(1.3,c.ef-0.2);}
    else{c.reps++;c.ef=Math.max(1.3,Math.min(2.6,c.ef+(0.1-(3-q)*(0.08+(3-q)*0.02))));
      c.interval=c.reps===1?1:c.reps===2?3:capInterval(Math.round(c.interval*c.ef));}
    c.due=now+(q===0?0:c.interval*DAY);c.last=now;Store.saveCard(id,c);return c;
  }
  function preview(id,q){const c=Store.card(id)||init();if(q===0)return "<10m";const reps=c.reps+1;let iv=reps===1?1:reps===2?3:Math.round(c.interval*c.ef);iv=capInterval(iv);return iv+"d";}
  function dueList(){const now=Date.now();const due=[],fresh=[];for(const card of CARDS){const c=Store.card(card.id);if(!c||!c.last)fresh.push(card);else if(c.due<=now)due.push(card);}
    const d=daysToExam();const cap=d==null?12:d<=2?40:d<=5?24:14;return due.concat(fresh).slice(0,cap);}
  function retention(){let n=0,ok=0;for(const card of CARDS){const c=Store.card(card.id);if(c){n+=c.delayN;ok+=c.delayOK;}}return n?ok/n:0;}
  return {grade,preview,dueList,retention,init};
})();

    prompt(p){return `Enterprise value = <b>${p.ev}</b>, Cash = <b>${p.cash}</b>, Debt = <b>${p.debt}</b>, Shares = <b>${p.sh}</b>. Compute the price per share.`;},
    solve(p){return M.sharePrice(M.equityFromEV(p.ev,p.cash,p.debt),p.sh);},
    steps(p){const e=M.equityFromEV(p.ev,p.cash,p.debt);return [{l:"Equity = EV + Cash − Debt",ex:`${p.ev}+${p.cash}−${p.debt} = ${e}`},{l:"Price = Equity / Shares",ex:`${e}/${p.sh} = ${M.r2(e/p.sh)}`}];},
    unit:"",tol:0.02}
};

Object.assign(TAKEAWAYS,{
  proj:{session:"Session 1 · Project Valuation",
    problem:"Is a project worth undertaking? Decide by the cash it actually generates for all investors, discounted for time and risk.",
    approach:"Forecast unlevered free cash flows over the project's life, add a terminal value, discount at the cost of capital, and take NPV. Use NPV as the decision rule; treat IRR and payback as secondary checks.",
    intuition:"Accounting earnings ≠ cash. We strip the income statement back to the economic cash available to debt and equity together: add back non-cash depreciation, remove investment in fixed assets (CAPX) and working capital, and ignore financing (interest). The tax we subtract is a 'fictitious' tax on EBIT — higher than the firm's actual tax bill because we don't deduct interest.",
    concepts:[
      ["Free cash flow","FCF = (1−t)·EBIT + Depreciation − CAPX − ΔNWC. Unlevered (to the whole firm), so no interest."],
      ["NPV rule","Invest if NPV > 0 — the benchmark is zero at the right discount rate, not a company-set hurdle or past averages. Best method, but sensitive to the discount rate."],
      ["IRR — limitations","The rate that sets NPV = 0. Ignores project scale (a $1M and a $100M project can share an IRR), can have multiple/again no solutions, and mis-ranks mutually exclusive projects."],
      ["Payback — limitations","Years to recover the outlay. Ignores the time value of money and all cash after the cutoff."],
      ["Net working capital","NWC = A/R + Inventory − A/P; only the CHANGE ΔNWC enters FCF. ↑A/P is a source of cash (raises FCF); ↑A/R or ↑inventory are uses (lower FCF)."],
      ["PPE roll-forward","PPE_end = PPE_begin + CAPX − Depreciation — used to back out CAPX from a forecast PPE path."],
      ["Terminal value","If the project ends, the liquidation value = Sale − t·(Sale − Book), then resolve NWC (collect A/R, pay A/P, sell inventory). If it continues, use the growing perpetuity."]],
    worked:"<b>One-year FCF.</b> EBIT 300, t 25%, Dep 80, CAPX 120, ΔNWC 30 → FCF = 0.75×300 + 80 − 120 − 30 = <b>155</b>. <b>Liquidation:</b> sell assets for 1.2 (book 1.0), t 30%, no NWC → 1.2 − 0.30×(1.2−1.0) = <b>1.14</b>.",
    formulas:["FCF = (1−t)·EBIT + Dep − CAPX − ΔNWC","NPV = −Inv + Σ FCF/(1+r)^t","Liquidation = Sale − t·(Sale − Book)"],
    pitfalls:["Using net income as FCF (it nets out interest and uses actual tax).","Subtracting interest in FCF — financing is excluded.","Confusing NWC (a level) with ΔNWC (the change that enters FCF)."],
    exam:["Sign of ΔNWC: ↑A/P raises FCF; ↑A/R / ↑inventory lower it.","Terminal value sits in the LAST year's cash flow and is discounted at the same r.","Tax on an asset sale is on the gain over book; a sale below book gives a tax credit."]},
  paper:{session:"Session 2 · Paper Tiger (case)",
    problem:"Should Paper Tiger acquire the Marsala cardboard plant? Build the plant's incremental free cash flows and take NPV.",
    approach:"Forecast a sales-driven income statement and balance sheet (costs and NWC as % of sales; PPE via roll-forward), convert to FCF, and rigorously include only INCREMENTAL cash flows — those that exist because of the deal.",
    intuition:"The acquisition is just a project. The only cash flows that matter are the differences between the world with the deal and the world without it. Many tempting numbers (sunk research, internal transfer prices, head-office allocations, loan interest) are either already spent, internal transfers that net to zero, or financing — none change the firm's total economic cash.",
    concepts:[
      ["Incremental rule","Count any cash flow generated WITH the project but not without it."],
      ["Include — transaction & opportunity costs","Future legal/banker/consultant fees (before tax, then taxed); the opportunity cost of assets the firm already owns and would otherwise sell or rent."],
      ["Exclude — sunk costs","Research already spent identifying the target is gone regardless — irrelevant."],
      ["Exclude — transfer pricing","If the plant sells to Paper Tiger 1.5% below market, the plant's lost margin exactly equals the box factories' gain → nets to zero, no adjustment."],
      ["Exclude — internal allocation","Head-office cost allocations are the same with or without the deal — not incremental."],
      ["Exclude — financing","Interest on the acquisition loan is financing; FCF is unlevered. (We separately credit the tax shield only when doing financial policy.)"],
      ["Sales-driven build","Costs and NWC scale with forecast sales; PPE = prior PPE + CAPX − Depreciation each year."]],
    worked:"<b>EBITDA from sales:</b> sales 200, COGS 50%, opex 10% → EBITDA = 200×(1−0.6) = <b>80</b>. <b>NWC:</b> sales 100 with inv 20%, A/R 10%, A/P 5% → 20 + 10 − 5 = <b>25</b>; next-year ΔNWC enters FCF.",
    formulas:["NWC = A/R + Inventory − A/P","PPE_end = PPE_begin + CAPX − Depreciation"],
    pitfalls:["Adding the transfer-price 'benefit' (double counts — it cancels).","Including sunk research or HQ allocation.","Including interest because the deal is debt-financed."],
    exam:["Be ready to classify a list of items as incremental or not — a guaranteed earner.","Owned/idle assets still carry an opportunity cost — include it.","Use FCF (unlevered) so the valuation is independent of financing."]},
  compval:{session:"Session 4 · Company Valuation",
    problem:"What is a whole company worth? Two complementary routes: discounted cash flow (DCF) and market multiples.",
    approach:"DCF: forecast FCF, add a terminal value, discount everything at WACC to get enterprise value, then cross the 'value bridge' to equity and per-share value. Multiples: compute peers' price/fundamental ratios, average them, and apply to the target's fundamental.",
    intuition:"DCF is intrinsic (what the cash flows are worth); multiples are relative (what the market pays for similar firms). DCF and the multiples both land on enterprise value or equity value — the value bridge (EV = Equity + Net Debt) lets you move between them in either direction.",
    concepts:[
      ["DCF = EV","Discounting unlevered FCF + terminal value at WACC gives ENTERPRISE value (assets), not market cap."],
      ["Terminal value","TV = (1+g)·FCF/(r−g), using the POST-forecast growth g. Discount the TV back at the SAME WACC used for the explicit period (steady state isn't risk-free)."],
      ["Value bridge","EV = market Equity + Net Debt ⇔ Equity = EV + Cash − Debt. Divide equity by shares for price."],
      ["P/E multiple","Equity multiple: Price/EPS (= MktCap/Earnings). Apply peer-average P/E to the target's EPS to get an implied price. Use the LATEST price and share count."],
      ["EV/EBITDA multiple","Enterprise multiple: per peer EV = MktCap + Debt − Cash, ratio = EV/EBITDA; apply the average to the target's EBITDA → implied EV, then value-bridge to equity."],
      ["P/E vs EV/EBITDA","P/E values the stock (after leverage); EV/EBITDA values the whole firm (before leverage), so it's comparable across firms with different debt."],
      ["Riskier ⇒ higher rate","A more volatile (systematic) cash-flow stream is discounted at a higher rate, lowering value."]],
    worked:"<b>TV:</b> final FCF 100, WACC 6%, g 1% → 1.01×100/(0.06−0.01) = <b>2020</b>. <b>Value bridge:</b> EV 200, cash 50, debt 100, 10 shares → equity 200+50−100 = 150 → price <b>15</b>.",
    formulas:["TV = (1+g)·FCF/(r−g)","EV = Equity + Net Debt","Implied EV = (EV/EBITDA)_peers × EBITDA_target"],
    pitfalls:["Using in-forecast growth in the TV formula instead of the post-forecast g.","Discounting the TV at a different (e.g. lower) rate.","Treating the DCF result as market cap rather than enterprise value."],
    exam:["State that DCF gives EV; then bridge to equity.","Multiples: always latest price/shares/cash/debt.","All-equity firm ⇒ WACC = r_E."]},
  bouygues:{session:"Session 6 · Bouygues (case)",
    problem:"A conglomerate (construction, telecom, media…) must value a project in ONE division. What discount rate should it use?",
    approach:"Not the company-wide WACC. Identify pure-play twins in that division's business, average their unlevered betas, relever at the division's target leverage, and build a division-specific WACC (the six steps).",
    intuition:"Different businesses carry different systematic (business) risk. A blended company WACC is too low for risky divisions and too high for safe ones, so using it everywhere systematically misallocates capital — overinvesting in risky divisions, underinvesting in safe ones.",
    concepts:[
      ["Company-wide WACC fallacy","Applying one firm-wide WACC to every project: overvalues high-β divisions, undervalues low-β divisions."],
      ["Pure-play twins","Listed firms operating only in the target business (e.g. Orange & Iliad for a telecom project). Average their asset betas to estimate the division's β_A."],
      ["Asset-beta drivers","Demand cyclicality (luxury, advertising → high) and operating leverage (high fixed costs amplify profit swings → high β_A). Same financing can still give different WACCs across industries."],
      ["Divisional relevering","Relever the division's β_A at the division's (or project's) target leverage, not the parent's."],
      ["Why not reject on the group WACC?","The group rate mixes unrelated businesses; a telecom project could well be positive-NPV at a telecom-appropriate rate even if negative at the group rate."]],
    worked:"<b>Telecom twins.</b> Orange β_E 0.25, D/E 103% → β_A = 0.25/2.03 ≈ 0.12. Iliad β_E 0.40, D/E 95% → β_A ≈ 0.21. Average β_A ≈ 0.16; relever at 40% leverage (D/E=0.67): β_E = 0.16×1.67 ≈ 0.27 → r_E = 3.5% + 0.27×5.5% ≈ 5% → telecom WACC ≈ <b>4.1%</b>.",
    formulas:["β_A = β_E/(1+D/E)","β_E = β_A·(1 + D/E)"],
    pitfalls:["Reusing the parent's blended WACC for a division.","Picking twins that aren't pure-plays in the right business.","Relevering at the parent's leverage instead of the division's."],
    exam:["Telecom project → telecom twins; show all six steps.","Explain WHY the company WACC is wrong (mixes business risks).","Tie a high asset beta to cyclicality and/or fixed costs."]},
  ma:{session:"Session 7 · M&A",
    problem:"Why do firms acquire, how do takeovers happen, and how much should an acquirer pay?",
    approach:"Separate the reasons (good deal vs value creation), the process (friendly vs hostile, defenses), and the valuation (control value = standalone + control premium), and judge the payment terms (cash vs stock).",
    intuition:"An acquirer can only justify a price above standalone value by what IT can add — synergies and improvements (the control premium). Accounting accretion (EPS going up) can happen with zero value created, so it is not a valuation test. How you pay also signals what you think your own shares are worth.",
    concepts:[
      ["Reasons to acquire","(1) Good deal: target underpriced or your stock/financing is cheap. (2) Value creation: operating/financial synergies, better management, improvements."],
      ["Buyers","Strategic (same/related industry — horizontal or vertical) vs financial (PE funds, SPACs)."],
      ["Friendly vs hostile","Friendly = negotiated with the board; hostile = offer straight to shareholders, often with a proxy fight to replace directors."],
      ["Takeover defenses","Poison pill (others buy discounted shares once an acquirer passes ~20%, diluting it), staggered board (only part elected yearly), dual-class/controlling owners."],
      ["Control valuation","Standalone value + control premium. Methods: DCF with quantified synergies; transaction (deal) EV/EBITDA multiples; public takeover premium vs the UNDISTURBED (pre-rumor) price."],
      ["Cash vs stock","Cash = certain payment, acquirer bears synergy risk, signals shares undervalued. Stock = target shares the risk, signals shares may be overvalued (and earns worse long-run returns)."],
      ["EPS-accretion fallacy","Buying a lower-P/E firm mechanically raises EPS with no value created — a red herring."]],
    worked:"<b>EPS accretion.</b> A (EPS 2, P/E 20, price 40, 100k shares) buys B (EPS 2, P/E 10, MktCap 2.0M) in stock. Shares issued = 2.0M/40 = 50k → combined earnings 400k / 150k shares = EPS <b>2.67</b> (accretive) — yet no value was created; it's purely the P/E difference.",
    formulas:["Shares issued = MktCap_target / Price_acquirer","Premium = (Deal − Undisturbed)/Undisturbed"],
    pitfalls:["Judging a deal by EPS accretion.","Using the post-rumor price as the premium baseline.","Forgetting that paying with stock can signal overvaluation."],
    exam:["'Accretive ⇒ good' is FALSE — explain why.","Use the undisturbed price for takeover premiums.","Control value includes synergies; standalone is just the benchmark."]},
  brick:{session:"Sessions 9–10 · The Brick House (case)",
    problem:"A booming business runs short of cash — a financial-policy failure, not an operating one. Diagnose and fix it.",
    approach:"Read the KPIs (ROE/ROA/ROIC), build the sources & uses of funds, and compare actual asset growth to the sustainable growth rate to classify the firm as a cash cow or cash calf — then adjust payout/financing or growth.",
    intuition:"Growth consumes cash (more receivables, inventory, PPE). If a firm grows faster than its retained earnings can fund, it must raise outside money or watch leverage climb. The sustainable growth rate is the speed at which a firm can grow with no change in leverage, payout, or equity issuance.",
    concepts:[
      ["ROE","Net Income / Book Equity. Useful but leverage-dependent: a high ROE can mean good operations OR just high debt."],
      ["ROA","(NI + Interest)/Assets — closer to operating performance, roughly leverage-free."],
      ["ROIC","EBIT·(1−t)/(Book Equity + Net Debt). The cleanest operating return; compare to WACC — ROIC > WACC means the business creates economic value."],
      ["Sources & uses","↑asset or ↓liability = a USE of funds; ↓asset or ↑liability = a SOURCE. Reconciles where cash came from and went."],
      ["Sustainable growth","g* = (1−d)·ROE, where d = payout ratio. The growth rate that keeps leverage, payout and share count fixed."],
      ["Cash cow vs cash calf","Compare actual asset growth g to g*. g < g* = cash cow (generates surplus; leverage falls unless it pays out/buys back more). g > g* = cash calf (needs outside funds; leverage rises unless it issues equity or cuts payout)."],
      ["ΔEquity","ΔEquity = Net Income − Dividends − Buybacks + Issuance — the book-equity roll-forward."]],
    worked:"<b>Cash calf check.</b> NI 14.3, equity 224.2 → ROE 6.38%; payout 50% → g* = 0.5×6.38% = <b>3.19%</b>. Asset growth (510.8−450.4)/450.4 = <b>13.4%</b> ≫ g* → cash calf: leverage will rise unless it issues equity or cuts dividends.",
    formulas:["g* = (1−d)·ROE","ΔEquity = NI − Div − Buyback + Issuance"],
    pitfalls:["Reading a high ROE as strong operations when it's really leverage.","Comparing growth to ROE instead of to g*.","If g > g*, mistakenly paying MORE dividends (worsens the gap)."],
    exam:["Compare actual asset growth to g* to label cow/calf and state the consequence.","Use ROIC vs WACC for value creation, not ROE.","If growth exceeds g*, retain more / raise funds; don't increase payout."]},
  ust:{session:"Session 12 · UST (case)",
    problem:"UST is a hugely profitable, low-debt near-monopoly. Should such a cash cow take on leverage?",
    approach:"Run the target-leverage checklist. With a large, stable, predictable tax bill and low business risk, the interest tax shield is valuable and distress risk is low → lever up, typically via a leveraged recapitalization.",
    intuition:"A firm with reliable profits 'wastes' a valuable tax subsidy by staying unlevered. Adding debt converts taxable income into tax-shielded interest, and the value of that shield (≈ τ·D) flows to shareholders. For a stable business the downside (distress) is small, so the trade-off favors more debt.",
    concepts:[
      ["UST's profile","Smokeless tobacco, ~77% share, slow-growing, advertising ban limits competition, exceptional and stable margins, ROE near 100% — a textbook cash cow with little debt."],
      ["Strong ITS case","Large, predictable taxable income → the interest tax shield is highly valuable. PV(ITS) ≈ τ·D for permanent debt."],
      ["Low distress risk","Stable, predictable cash flows and limited competition mean a low probability and cost of financial distress."],
      ["Leveraged recap","Borrow and use the proceeds to repurchase shares (or pay a special dividend): raises D, shrinks E, and captures the tax shield. V_new = V_old + τ·D."],
      ["Who benefits","Shareholders capture the tax shield; the 'extra' value is a government subsidy."]],
    worked:"<b>Recap value.</b> Issue $1bn of debt to buy back shares at τ = 38% → value created ≈ τ·D = 0.38×1 = <b>$0.38bn</b>, added to firm value and accruing to shareholders.",
    formulas:["PV(ITS) = τ·D","V_L = V_U + τ·D"],
    pitfalls:["Arguing UST shouldn't lever because 'debt is risky' — its business is unusually safe.","Forgetting the ITS needs profits to be valuable (UST has plenty).","Ignoring that the recap mechanism is borrow-then-buy-back."],
    exam:["Tie the strong ITS to UST's large, stable tax bill.","Note the low distress risk from stable cash flows.","Explain the leveraged recap and that the shield accrues to equity."]},
  loewen:{session:"Session 13 · Loewen (case)",
    problem:"An aggressive debt-funded roll-up has tipped into financial distress. Diagnose the causes and decide what to do now.",
    approach:"Assess the business and distress (bad luck / bad business / bad policy), check for debt overhang, and set target leverage by lifecycle stage; weigh remedies (raise funds, sell assets, restructure).",
    intuition:"Loewen's strategy (buying up fragmented funeral homes) needs constant access to capital. With negative operating cash flow and ballooning leverage, risky debt creates an overhang: new positive-NPV deals would mostly benefit existing creditors, so equity won't fund them — starving the very strategy that justified the debt.",
    concepts:[
      ["Distress signals","Negative operating cash flow for several years, leverage blown up, liquidity plunged; higher leverage than peers."],
      ["Debt overhang","Can't raise equity for positive-NPV investments because gains flow to existing creditors — a real cost of being over-levered."],
      ["Lifecycle leverage","Target leverage isn't fixed: an active consolidation phase (high investment, competition) argues for MODERATE leverage; a steady state could support more."],
      ["Diagnosis framework","Distress can come from bad luck, a bad business, or bad financial policy — often all three; the cause shapes the remedy."],
      ["Bankruptcy basics","Chapter 7 = liquidation; Chapter 11 = reorganize while continuing to operate. Senior debt is paid before junior debt."],
      ["Remedies","Raise funds, sell assets, or restructure debt — each with pros/cons; distressed firms tend to delay action too long, hoping for a rebound."]],
    formulas:["—"],formulaNote:"Conceptual session — reuse the ITS, distress and overhang ideas from Capital Structure.",
    pitfalls:["Recommending more debt for the tax shield when the firm is unprofitable/distressed.","Ignoring overhang when asking why it can't just raise equity.","Assuming one target leverage for all lifecycle stages."],
    exam:["For an unprofitable distressed consolidator, leverage should be moderate (not maxed for ITS).","'Grow externally' = grow via M&A.","Know Ch.7 vs Ch.11 and senior vs junior debt."]},
  mispricing:{session:"Session 14 · Security Mispricing",
    problem:"When managers know more than the market (asymmetric information), does the choice of financing matter — and how does the market react?",
    approach:"Model the information gap: the market prices at expected value, creating mispricing; adverse selection means issuers are disproportionately overvalued, so the market discounts issuance. This generates the pecking order and issuance/payout signals.",
    intuition:"If only you know your firm is undervalued, issuing equity sells cheap shares and hurts existing owners — so you'd rather use internal cash or debt. The market knows firms behave this way, so an equity issue is read as 'probably overvalued,' pushing the price down. Debt is shielded from this because lenders mostly care about the downside, not the upside you disagree about.",
    concepts:[
      ["Mispricing","Market sets price at expected value across states; managers know the true state → shares are over- or under-priced relative to the truth."],
      ["Adverse selection","Overvalued firms are keener to issue equity, so a rational market marks issuance down — even good firms get tarred."],
      ["Underinvestment from underpricing","An undervalued firm may PASS on a positive-NPV project rather than issue cheap equity to fund it (like debt overhang, but driven by information, not debt)."],
      ["Pecking order","Preferred financing: retained earnings > debt > equity (least information-sensitive first)."],
      ["Debt less sensitive","Lenders care about the probability of repayment (downside), not the upside, so debt suffers far less mispricing than equity."],
      ["Signaling","Equity issuance = negative signal; dividends and buybacks = positive signals. 'Cheap talk' (just announcing good news) doesn't work — every firm would claim it."]],
    worked:"<b>BioPeck.</b> Market value 125 (½×50 + ½×200), 10 shares → price 12.5; manager knows true value 200 → 20/share, so it's underpriced by <b>7.5</b>. To fund a project it must issue shares at p = (125+65−50)/10 = <b>14</b> < 20 — issuing cheap equity can destroy more value than the project's NPV, so it may skip it and prefer debt.",
    formulas:["(N+n)·p = V_market + ΔProject ;  n·p = Raise"],
    pitfalls:["Saying equity issuance drops the price 'because of dilution' — the driver is the signal.","Ignoring that debt avoids most of the information problem.","Getting the pecking order backwards."],
    exam:["Explain the price drop on issuance via adverse selection/signaling.","Link the example to the pecking order.","Note an undervalued firm may rationally skip a good project rather than issue cheap equity."]},
  infineon:{session:"Session 15 · Infineon (case)",
    problem:"A highly cyclical, cash-rich semiconductor firm: what capital structure and payout policy are appropriate?",
    approach:"Run the checklist on NET debt: weak tax shield + high distress risk argue for low or negative leverage (cash > debt). Then decide payout, balancing business reasons to retain against signaling reasons to distribute.",
    intuition:"Chip demand swings violently and fixed costs are high, so profits are volatile and distress is costly — the opposite of UST. With a minimal tax bill, the tax shield gives little reason to borrow, so holding a cash buffer (negative net debt) is prudent. Payout then turns on whether the cash earns more inside the firm than its cost of capital.",
    concepts:[
      ["High business risk","Cyclical demand + high fixed costs (operating leverage) → high asset beta and high cost of financial distress."],
      ["Weak ITS","A minimal/volatile tax bill means the interest tax shield is a weak reason to lever up."],
      ["Negative net leverage","Recommendation: hold cash > debt as a buffer against the cycle (net debt < 0)."],
      ["Payout rule","Return cash if its return inside the firm is below the cost of capital; retain it if there are good investments or a need for a cyclical buffer."],
      ["Dividend vs buyback mechanics","A special dividend lowers the share price by the per-share dividend; a fair-value buyback leaves the price unchanged (fewer shares, less cash)."],
      ["Signaling","Both dividends and buybacks signal confidence; CFOs avoid CUTTING dividends because cuts signal deteriorating prospects (dividends are sticky)."]],
    worked:"<b>Payout mechanics.</b> EV 4bn, cash 2bn, no debt, 100m shares → equity 6bn, price 60. A $10 special dividend → price falls to <b>50</b>. A $1bn buyback at 60 retires ~16.7m shares; price stays <b>60</b> (cash down 1bn, shares down).",
    formulas:["Special dividend: price drops by div/share","Fair buyback: price unchanged"],
    pitfalls:["'Extra cash ⇒ always pay dividends' — depends on investment opportunities.","Recommending leverage for the tax shield when the tax bill is minimal.","Treating a buyback like a dividend for the share price."],
    exam:["Use NET debt; recommend negative leverage for a cyclical cash-rich firm.","Pay out only if return on cash < cost of capital.","Both dividends and buybacks are positive signals; cuts are negative."]}
});

    prompt(p){return `A peer trades at price <b>${p.peerPrice}</b> with EPS <b>${p.peerEPS}</b>. Your target has EPS <b>${p.tEPS}</b>. Implied price?`;},
    solve(p){const peer=M.pe(p.peerPrice,p.peerEPS);return M.peValue(peer,p.tEPS);},
    steps(p){const peer=M.pe(p.peerPrice,p.peerEPS);return [{l:"Peer P/E",ex:`${p.peerPrice}/${p.peerEPS}=${M.r2(peer)}`},{l:"× target EPS",ex:`${M.r2(peer)}×${p.tEPS}=${M.r2(M.peValue(peer,p.tEPS))}`}];},unit:"",tol:0.05},
  preax:{topic:"beyond",title:"Pre-tax WACC (r_A)",
    gen(r){return {lev:pick(r,[0.3,0.4,0.5,0.6]),rD:rf(r,3,6,1),rE:rf(r,8,14,1)};},
    prompt(p){return `Leverage <b>${(p.lev*100).toFixed(0)}%</b>, r_D=<b>${p.rD}%</b>, r_E=<b>${p.rE}%</b>. Compute the pre-tax WACC r_A (%).`;},
    solve(p){return M.preTaxWacc(p.lev,p.rD,p.rE);},
    steps(p){return [{l:"r_A = D/(D+E)·r_D + E/(D+E)·r_E",ex:`${p.lev}×${p.rD}+${(1-p.lev).toFixed(2)}×${p.rE}=${M.r2(M.preTaxWacc(p.lev,p.rD,p.rE))}%`}];},unit:"%",tol:0.02}
});

  {id:"c_distress",topic:"capstruct",type:"concept",front:"Costs of financial distress = ?",back:"Cost of distress × <b>risk</b> of distress. Indirect costs (lost customers/suppliers/employees, fire sales, overhang, risk-shifting) arise even without actual default."},
  {id:"c_overhang",topic:"capstruct",type:"concept",front:"Debt overhang?",back:"Near distress with risky debt, firms skip positive-NPV projects because gains accrue to existing creditors → underinvestment."},
  {id:"c_cowcalf",topic:"brick",type:"concept",front:"Cash cow vs cash calf?",back:"Compare asset growth g to g*=(1−d)ROE. g<g* = cow (leverage falls); g>g* = calf (leverage rises unless issue equity / cut payout)."},
  {id:"c_pecking",topic:"mispricing",type:"concept",front:"Pecking order of financing?",back:"Retained earnings &gt; debt &gt; equity (least information-sensitive first)."},
  {id:"c_signal",topic:"mispricing",type:"concept",front:"Signaling: market reaction to issuance vs payout?",back:"Equity issuance → negative signal. Dividends &amp; buybacks → positive signal. Cheap talk doesn't work."},
  {id:"c_eps",topic:"ma",type:"concept",front:"Is EPS accretion evidence of value creation?",back:"No — acquiring a lower-P/E firm raises EPS mechanically with zero value created. A red herring."},
  {id:"c_control",topic:"ma",type:"concept",front:"Control valuation = ?",back:"Standalone value + control premium (synergies + improvements). Methods: DCF-with-synergies, transaction multiple, takeover premium vs undisturbed price."},
  {id:"c_recap",topic:"ust",type:"concept",front:"Leveraged recap effect on value?",back:"Borrow to buy back shares: V_new = V_old + τ·D. The tax shield accrues to shareholders."},
  {id:"c_wacclev",topic:"beyond",type:"concept",front:"Why does after-tax WACC fall with leverage but pre-tax WACC doesn't?",back:"Pre-tax r_A reflects asset risk (MM, unchanged). After-tax WACC falls only through the interest tax shield."},
  {id:"c_bridge",topic:"compval",type:"concept",front:"Value bridge?",back:"EV = market Equity + Net Debt. So Equity = EV + Cash − Debt."}
]);

function readiness(){
  let sum=0,n=0;
  for(const t of TOPICS){const a=Store.topicAcc(t.id);const td=Store.get().topics[t.id];const seen=td&&td.n?Math.min(1,td.n/6):0;sum+=a*0.7*seen+seen*0.3;n++;}
  return Math.round((sum/n)*100);
}

/* ---------- Mount functions ---------- */
function mountCalc(id){
  const mt=$("#calcmount");if(!mt)return;
  const keys=Object.keys(Templates).filter(k=>Templates[k].topic===id);
  if(!keys.length){mt.innerHTML=`<div class="card"><p class="muted">No calculation drills for this session — the concepts are tested in the Concepts tab and worked examples in Takeaways.</p></div>`;return;}
  let state={key:keys[0],seed:Date.now()%100000,revealed:false};
  function draw(){
    const T=Templates[state.key];const p=T.gen(rng(state.seed));
    const ans=T.solve(p);
    mt.innerHTML=`<div class="seg" style="margin-bottom:14px">${keys.map(k=>`<button class="${k===state.key?'on':''}" data-k="${k}">${esc(Templates[k].title)}</button>`).join("")}</div>
    <div class="card"><p>${T.prompt(p)}</p>
      <div class="row"><input id="calcin" inputmode="decimal" placeholder="Your answer${T.unit?" ("+T.unit+")":""}" style="max-width:200px"><button class="btn primary" id="calcck">Check</button><button class="btn ghost" id="calcnew">New numbers</button></div>
      <div id="calcfb" style="margin-top:12px"></div></div>`;
    mt.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{state.key=b.dataset.k;state.seed=Date.now()%100000;draw();});
    $("#calcnew").onclick=()=>{state.seed=(state.seed+7919)%100000;draw();};
    $("#calcck").onclick=()=>{
      const v=parseFloat($("#calcin").value.replace(",","."));
      const fb=$("#calcfb");
      if(isNaN(v)){fb.innerHTML=`<span class="muted">Enter a number.</span>`;return;}
      const tol=Math.max(T.tol,Math.abs(ans)*0.01);
      const ok=Math.abs(v-ans)<=tol+1e-9;
      Store.logAttempt(id,ok);

function mountMCQ(id){

function mountExplore(id){

  let cur=keys[0];

    const W=560,H=240,pad=42;
    const pts=E.plot(vals);

    const X=x=>pad+(x-xmin)/(xmax-xmin||1)*(W-pad-10);

      <text x="${pad}" y="${H-pad+12}" fill="var(--tx3)" font-size="11">${E.xlab?(xmin*100).toFixed(0)+"%":"0%"}</text>
      ${E.series.map(s=>`<path d="${path(s)}" fill="none" stroke="${s.color}" stroke-width="2.2"/>`).join("")}
    </svg>`;
    mt.innerHTML=`${keys.length>1?`<div class="seg" style="margin-bottom:12px">${keys.map(k=>`<button class="${k===cur?'on':''}" data-k="${k}">${esc(EXPLORE[k].title)}</button>`).join("")}</div>`:""}
      <div class="card"><b>${esc(E.title)}</b><p class="muted" style="font-size:13.5px;margin:.4em 0 1em">${esc(E.desc)}</p>
      ${svg}
      <div class="legend" style="margin:8px 0 4px">${E.series.map(s=>`<span><span style="display:inline-block;width:11px;height:11px;background:${s.color};border-radius:2px;vertical-align:middle"></span> ${esc(s.label)}</span>`).join("")}</div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:10px">${E.controls.map(c=>`<label style="font-size:13px;color:var(--tx2)">${esc(c.label)}: <b id="lab_${c.key}">${c.pct?(vals[c.key]*100).toFixed(1)+"%":vals[c.key]}</b><input type="range" min="${c.min}" max="${c.max}" step="${c.step}" value="${vals[c.key]}" data-ck="${c.key}" data-pct="${c.pct?1:0}" style="width:100%"></label>`).join("")}</div>
      </div>`;
    mt.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{cur=b.dataset.k;draw();});

    function redraw(){const E=EXPLORE[cur];const pts=E.plot(vals);const allY=[];E.series.forEach(s=>pts.forEach(p=>allY.push(p[s.key])));const xs=pts.map(p=>p.lev);const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...allY,0),ymax=Math.max(...allY);const X=x=>pad+(x-xmin)/(xmax-xmin||1)*(W-pad-10);const Y=y=>H-pad-(y-ymin)/(ymax-ymin||1)*(H-pad-12);mt.querySelectorAll("svg path").forEach((pth,i)=>{const s=E.series[i];pth.setAttribute("d",pts.map((p,j)=>(j?"L":"M")+X(p.lev).toFixed(1)+" "+Y(p[s.key]).toFixed(1)).join(" "));});}
  }

    rub.innerHTML=`<div class="card" style="background:var(--card2)"><b>Tick the points you actually made:</b>
      ${e.points.map((p,i)=>`<label class="opt" style="cursor:pointer"><input type="checkbox" data-p="${i}"> ${esc(p)}</label>`).join("")}
      <button class="btn primary sm" id="score2" style="margin-top:8px">Score</button><div id="escore" style="margin-top:10px"></div></div>`;
    $("#score2").onclick=()=>{
      const hit=rub.querySelectorAll("[data-p]:checked").length;const tot=e.points.length;const pct=Math.round(hit/tot*100);
      Store.logAttempt(k,pct>=60);
      $("#escore").innerHTML=`<div class="${pct>=60?'good':'warn'}" style="font-weight:700">${hit}/${tot} rubric points (${pct}%)</div>
        <div class="card" style="margin-top:8px;background:var(--bg2)"><div class="muted" style="margin-bottom:6px">Model answer</div>${esc(e.model)}</div>`;
    };
  };
}

function mountTrain(kind){
  const mt=$("#trainmount");if(!mt)return;
  if(kind==="miscon"){
    let i=0,score=0,seen=0;const order=MISCONCEPTIONS.map((_,j)=>j);
    function draw(){const m=MISCONCEPTIONS[i%MISCONCEPTIONS.length];
      mt.innerHTML=`<div class="muted" style="margin-bottom:6px">Score ${score}/${seen}</div><div class="card"><p style="font-size:16px;font-weight:600">${esc(m.s)}</p>
        <div class="row" style="margin-top:8px"><button class="btn" data-v="1">Myth ✗</button><button class="btn" data-v="0">Fact ✓</button></div><div id="tfb" style="margin-top:10px"></div></div>`;
      mt.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>{if(mt.dataset.done)return;mt.dataset.done="1";const said=b.dataset.v==="1";const ok=said===m.myth;seen++;if(ok)score++;Store.logAttempt("capstruct",ok);
        $("#tfb").innerHTML=`<div class="${ok?'good':'bad'}" style="font-weight:700">${ok?'Correct':'Not quite'} — this is a ${m.myth?'MYTH':'FACT'}.</div><p class="muted" style="margin:.4em 0">${esc(m.why)}</p><button class="btn primary sm" id="tnext">Next →</button>`;
        $("#tnext").onclick=()=>{i++;mt.dataset.done="";draw();};});}
    draw();
  } else if(kind==="incr"){
    let i=0,score=0,seen=0;
    function draw(){const it=INCREMENTAL[i%INCREMENTAL.length];
      mt.innerHTML=`<div class="muted" style="margin-bottom:6px">Score ${score}/${seen}</div><div class="card"><p style="font-size:15px">In a project NPV, is this <b>incremental</b>?</p><p style="font-size:16px;font-weight:600">${esc(it.item)}</p>
        <div class="row" style="margin-top:8px"><button class="btn" data-v="1">Include</button><button class="btn" data-v="0">Exclude</button></div><div id="tfb" style="margin-top:10px"></div></div>`;
      mt.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>{if(mt.dataset.done)return;mt.dataset.done="1";const said=b.dataset.v==="1";const ok=said===it.inc;seen++;if(ok)score++;Store.logAttempt("paper",ok);
        $("#tfb").innerHTML=`<div class="${ok?'good':'bad'}" style="font-weight:700">${ok?'Correct':'Not quite'} — ${it.inc?'INCLUDE':'EXCLUDE'}.</div><p class="muted" style="margin:.4em 0">${esc(it.why)}</p><button class="btn primary sm" id="tnext">Next →</button>`;
        $("#tnext").onclick=()=>{i++;mt.dataset.done="";draw();};});}
    draw();
  } else {
    let si=0;
    function draw(){const sc=CHECKLISTS[si];const picks={};
      mt.innerHTML=`<div class="seg" style="margin-bottom:12px">${CHECKLISTS.map((c,j)=>`<button class="${j===si?'on':''}" data-s="${j}">${esc(c.nm)}</button>`).join("")}</div>
        <div class="card"><p>${esc(sc.desc)}</p><p class="muted" style="font-size:13px">For each factor, does it push toward MORE or LESS debt than the average firm?</p>
        ${sc.factors.map((f,j)=>`<div style="margin:10px 0;border-top:1px solid var(--line);padding-top:10px"><b>${esc(f[0])}</b><div class="row" style="margin-top:6px"><button class="btn sm" data-f="${j}" data-d="more">More debt</button><button class="btn sm" data-f="${j}" data-d="less">Less debt</button><span id="ff_${j}" class="muted" style="font-size:13px"></span></div></div>`).join("")}
        <div id="crec" style="margin-top:12px"></div></div>`;
      mt.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{si=+b.dataset.s;draw();});
      mt.querySelectorAll("[data-f]").forEach(b=>b.onclick=()=>{const j=+b.dataset.f,f=sc.factors[j];const ok=b.dataset.d===f[1];picks[j]=ok;$("#ff_"+j).innerHTML=`<span class="${ok?'good':'bad'}">${ok?'✓':'✗ ('+f[1]+' debt)'}</span> ${esc(f[2])}`;
        if(Object.keys(picks).length===sc.factors.length){const right=Object.values(picks).filter(Boolean).length;Store.logAttempt("capstruct",right>=sc.factors.length-1);$("#crec").innerHTML=`<div class="card" style="background:var(--card2)"><b>${right}/${sc.factors.length} correct.</b> Recommendation: <span class="pill g">${esc(sc.rec)}</span></div>`;}});}
    draw();
  }
}
function mountSheet(){
  const mt=$("#sheetmount");if(!mt)return;
  let sel=Store.get().sheet;if(!sel)sel=FORMULAS.filter(f=>f.critical).map(f=>f.nm);
  const setSel=()=>Store.update(s=>s.sheet=sel.slice());
  function draw(){
    const byT={};FORMULAS.forEach(f=>{(byT[f.t]=byT[f.t]||[]).push(f);});
    const picker=TOPICS.filter(t=>byT[t.id]).map(t=>`<div class="card" style="margin:8px 0"><b>${esc(t.nm)}</b>${byT[t.id].map(f=>`<label class="opt" style="cursor:pointer;display:flex;gap:8px;align-items:center"><input type="checkbox" data-nm="${esc(f.nm)}" ${sel.includes(f.nm)?"checked":""}> <span>${esc(f.nm)} ${f.critical?'<span class=\"pill g\">★</span>':''}</span></label>`).join("")}</div>`).join("");
    const chosen=FORMULAS.filter(f=>sel.includes(f.nm));
    const fit=chosen.length<=26?`<span class="good">${chosen.length} items — fits a double-sided A4</span>`:`<span class="warn">${chosen.length} items — may overflow A4; trim a few</span>`;
    const print=`<div id="printsheet"><h2 style="margin:0 0 8px">Corporate Finance — Cheat Sheet</h2><div class="sheetcols">${chosen.map(f=>`<div class="sheetitem"><b>${esc(f.nm)}</b><div class="formula">${f.expr}</div><div class="muted" style="font-size:11px">${esc(f.when)}</div></div>`).join("")}</div></div>`;
    mt.innerHTML=`<div class="row" style="justify-content:space-between;margin-bottom:8px"><span>${fit}</span><span class="row"><button class="btn sm" id="allcrit">★ critical only</button><button class="btn sm" id="allf">Select all</button></span></div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px" id="sheetgrid"><div>${picker}</div><div><div class="muted" style="font-size:12px;margin-bottom:6px">A4 preview</div><div class="card">${print}</div></div></div>`;
    mt.querySelectorAll("[data-nm]").forEach(cb=>cb.onchange=()=>{const nm=cb.dataset.nm;if(cb.checked){if(!sel.includes(nm))sel.push(nm);}else sel=sel.filter(x=>x!==nm);setSel();draw();});
    $("#allcrit").onclick=()=>{sel=FORMULAS.filter(f=>f.critical).map(f=>f.nm);setSel();draw();};
    $("#allf").onclick=()=>{sel=FORMULAS.map(f=>f.nm);setSel();draw();};
  }
  draw();
}

function mountExam(){
  const mt=$("#exammount");if(!mt)return;
  let paper=null,endTime=0,timerId=null,submitted=false;
  function start(mins){
    const seed=Date.now()%100000;const r=rng(seed);
    const pool=[];Object.keys(MCQS).forEach(t=>MCQS[t].forEach(q=>pool.push({t,q})));
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    const mcqs=pool.slice(0,8).map(m=>({t:m.t,q:m.q,disp:shuffled(m.q.options)}));
    const tkeys=["fcf","tv","capm","unlever","wacc","sust"];const pts=[10,15,15,15,15,10];
    const probs=tkeys.map((k,i)=>{const T=Templates[k];return {k,T,p:T.gen(rng(seed+i*101+7)),pts:pts[i],star:i===3||i===4};});
    paper={seed,mcqs,probs};endTime=Date.now()+mins*60000;submitted=false;render();
    timerId=setInterval(tick,1000);
  }
  function fmt(ms){if(ms<0)ms=0;const s=Math.floor(ms/1000);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
  function tick(){const el=$("#extimer");if(!el)return;const left=endTime-Date.now();el.textContent="⏱ "+fmt(left);if(left<=0){clearInterval(timerId);if(!submitted)grade();}}
  function render(){
    const mcqHTML=paper.mcqs.map((m,i)=>`<div class="card" style="margin:10px 0"><div class="muted" style="font-size:12px">Q${i+1} · ${esc(topicNm(m.t))} · 2.5 pts</div><p style="font-weight:600">${esc(m.q.q)}</p>
      ${m.disp.map((o,j)=>`<label class="opt" style="cursor:pointer;display:flex;gap:8px;align-items:flex-start"><input type="radio" name="m${i}" value="${j}"> <span><b>${String.fromCharCode(65+j)}.</b> ${esc(o.t)}</span></label>`).join("")}
      <div class="row" style="margin-top:6px;font-size:12px;color:var(--tx2)">Confidence: ${["Guess","Unsure","Sure"].map((c,ci)=>`<label style="cursor:pointer"><input type="radio" name="c${i}" value="${c.toLowerCase()}" ${ci===1?"checked":""}> ${c}</label>`).join(" · ")}</div></div>`).join("");
    const probHTML=paper.probs.map((pr,i)=>`<div class="card" style="margin:10px 0"><div class="muted" style="font-size:12px">P${i+1} · ${esc(pr.T.title)} · ${pr.pts} pts${pr.star?' <span class="pill b">*</span>':''}</div><p>${pr.T.prompt(pr.p)}</p>
      <input id="ep${i}" inputmode="decimal" placeholder="Answer${pr.T.unit?" ("+pr.T.unit+")":""}" style="max-width:180px"></div>`).join("");
    mt.innerHTML=`<div class="row" style="justify-content:space-between;position:sticky;top:60px;background:var(--bg);padding:8px 0;z-index:5"><b id="extimer">⏱ ${fmt(endTime-Date.now())}</b><button class="btn primary sm" id="exsubmit">Submit exam</button></div>
      <h2>Part I — Quiz (20 pts)</h2>${mcqHTML}
      <h2>Part II — Problems (80 pts)</h2>${probHTML}
      <button class="btn primary" id="exsubmit2" style="margin-top:10px">Submit exam</button><div id="exresult" style="margin-top:14px"></div>`;
    $("#exsubmit").onclick=grade;$("#exsubmit2").onclick=grade;
  }
  function grade(){
    if(submitted)return;submitted=true;clearInterval(timerId);
    let gotI=0,gotII=0;const review=[];
    paper.mcqs.forEach((m,i)=>{
      const sel=mt.querySelector(`input[name="m${i}"]:checked`);const conf=(mt.querySelector(`input[name="c${i}"]:checked`)||{}).value||"unsure";
      const ci=m.disp.findIndex(o=>o.correct);const ok=sel&&(+sel.value===ci);
      if(ok)gotI+=2.5;
      Store.update(s=>{const c=s.calib[conf]||(s.calib[conf]={n:0,ok:0});c.n++;if(ok)c.ok++;});
      Store.logAttempt(m.t,!!ok);
      if(!ok)Store.addMistake({kind:"mcq",key:"ex_"+paper.seed+"_m"+i,topic:m.t,q:m.q.q,options:m.q.options,ts:Date.now()});
      review.push(`<div class="card" style="margin:8px 0"><div class="${ok?'good':'bad'}" style="font-weight:700">Q${i+1} ${ok?'✓':'✗'} (${conf})</div><div style="font-size:13px">${esc(m.q.q)}</div><div class="muted" style="font-size:13px;margin-top:4px">Answer: ${esc(m.disp[ci].t)} — ${esc(m.disp[ci].why)}</div></div>`);
    });
    paper.probs.forEach((pr,i)=>{
      const v=parseFloat(($("#ep"+i).value||"").replace(",","."));const ans=pr.T.solve(pr.p);const tol=Math.max(pr.T.tol,Math.abs(ans)*0.01);const ok=!isNaN(v)&&Math.abs(v-ans)<=tol+1e-9;
      if(ok)gotII+=pr.pts;Store.logAttempt(pr.T.topic,!!ok);
      if(!ok)Store.addMistake({kind:"quant",key:"ex_"+paper.seed+"_p"+i,topic:pr.T.topic,title:pr.T.title,prompt:pr.T.prompt(pr.p),answer:M.r2(ans),unit:pr.T.unit||"",steps:pr.T.steps(pr.p),ts:Date.now()});
      review.push(`<div class="card" style="margin:8px 0"><div class="${ok?'good':'bad'}" style="font-weight:700">P${i+1} ${ok?'✓':'✗'} (${pr.pts} pts)</div><div style="font-size:13px">${pr.T.prompt(pr.p)}</div><div class="muted" style="font-size:13px;margin-top:4px">Answer: ${M.r2(ans)}${pr.T.unit||""}</div></div>`);
    });
    const total=gotI+gotII;const band=total>=85?"A":total>=70?"B":total>=55?"C":total>=40?"D":"F";
    $("#exresult").innerHTML=`<div class="card" style="background:var(--card2)"><div class="row" style="justify-content:space-between"><b>Result</b><span class="pill ${total>=55?'g':'b'}">${band}</span></div>
      <div class="bignum" style="margin:.2em 0">${M.r2(total)}%</div>
      <div class="muted">Part I ${M.r2(gotI)}/20 · Part II ${gotII}/80. Missed items added to your <a href="#/mistakes">Mistakes queue</a>.</div>
      <h3>Review</h3>${review.join("")}
      <button class="btn" onclick="location.hash='#/exam';App.route()">New exam</button></div>`;
    try{$("#exresult").scrollIntoView({behavior:"smooth",block:"start"});}catch(e){}
  }
  mt.innerHTML=`<div class="card"><b>Ready?</b><p class="muted">8 quiz questions + 6 problems, point-weighted like the real paper. Pick a duration and work without notes.</p>
    <div class="row"><button class="btn primary" data-min="180">Full 3h</button><button class="btn" data-min="60">Quick 60 min</button><button class="btn" data-min="20">Sprint 20 min</button></div></div>`;
  mt.querySelectorAll("[data-min]").forEach(b=>b.onclick=()=>start(+b.dataset.min));
}
function mountStats(){
  const mt=$("#statsmount");if(!mt)return;
  const st=Store.get();const rd=readiness();
  const recent=st.attempts.slice(-50);const racc=recent.length?Math.round(recent.filter(a=>a.ok).length/recent.length*100):0;
  const cal=st.calib;const calRow=(k)=>{const c=cal[k]||{n:0,ok:0};return `<tr><td>${k[0].toUpperCase()+k.slice(1)}</td><td>${c.n}</td><td>${c.n?Math.round(c.ok/c.n*100):0}%</td></tr>`;};
  const ret=Math.round(SR.retention()*100);
  const topics=TOPICS.map(t=>({t,m:topicMastery(t.id)})).sort((a,b)=>a.m-b.m);
  mt.innerHTML=`<div class="grid cards" style="margin-top:12px">
    <div class="card"><div class="muted">Exam readiness</div><div class="bignum">${rd}%</div></div>
    <div class="card"><div class="muted">Recent accuracy (last ${recent.length})</div><div class="bignum">${racc}%</div></div>
    <div class="card"><div class="muted">Deck retention (delayed recall)</div><div class="bignum">${ret}%</div></div>
    <div class="card"><div class="muted">Mistakes open</div><div class="bignum">${st.mistakes.length}</div></div></div>
    <h2>Calibration</h2><div class="card"><p class="muted" style="font-size:13px">How often you're right at each confidence level — well-calibrated means "Sure" ≫ "Guess".</p>
      <table class="dt"><tr><th>Confidence</th><th>n</th><th>% right</th></tr>${calRow("sure")}${calRow("unsure")}${calRow("guess")}</table></div>
    <h2>Weakest topics</h2><div class="card">${topics.slice(0,6).map(x=>`<div style="margin:8px 0"><div class="row" style="justify-content:space-between"><span>${esc(x.t.nm)}</span><span class="muted">${x.m}%</span></div><div class="bar"><i style="width:${x.m}%"></i></div></div>`).join("")}</div>
    <h2>Backup</h2><div class="card"><div class="row"><button class="btn" id="expbtn">⬇ Download backup</button><label class="btn" style="cursor:pointer">⬆ Restore<input type="file" id="impfile" accept="application/json" style="display:none"></label><button class="btn ghost" id="resetbtn">Reset all progress</button></div></div>`;
  $("#expbtn").onclick=()=>{const blob=new Blob([JSON.stringify(Store.get())],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="cf-dojo-backup.json";a.click();};
  $("#impfile").onchange=(e)=>{const f=e.target.files[0];if(!f)return;const rdr=new FileReader();rdr.onload=()=>{try{const data=JSON.parse(rdr.result);Store.update(s=>Object.assign(s,data));toast("Progress restored");route();}catch(err){toast("Invalid backup file");}};rdr.readAsText(f);};
  $("#resetbtn").onclick=()=>{if(confirm("Erase all progress on this device?")){Store.reset();route();}};
}

/* ---------- Router ---------- */
const NAV=[["#/home","Home","home"],["#/learn","Learn","learn"],["#/practice","Practice","mix"],["#/cases","Cases","case"],["#/exam","Exam","exam"],["#/reference","Formulas","sheet"]];
const BOTTOM=NAV.slice(0,5);
const PRACTICE_ROUTES=["#/deck","#/mix","#/train","#/essays","#/mistakes"];
const REFERENCE_ROUTES=["#/formula","#/sheet"];
function renderNav(){
  const cur=location.hash||"#/home";
  const act=h=>{
    if(h==="#/practice")return cur.startsWith("#/practice")||PRACTICE_ROUTES.some(r=>cur===r||cur.startsWith(r+"/"));
    if(h==="#/reference")return cur.startsWith("#/reference")||REFERENCE_ROUTES.some(r=>cur===r||cur.startsWith(r+"/"));
    if(h==="#/cases")return cur.startsWith("#/cases")||cur.startsWith("#/case");
    return cur===h||cur.startsWith(h+"/");
  };
  $("#tabs").innerHTML=NAV.map(([h,l])=>`<a href="${h}" class="${act(h)?'on':''}">${esc(l)}</a>`).join("");
  $("#bottomnav").innerHTML=BOTTOM.map(([h,l,ic])=>`<a href="${h}" class="${act(h)?'on':''}"><span>${icon(ic)}</span>${esc(l)}</a>`).join("");
}
function route(){
  const parts=(location.hash||"#/home").slice(2).split("/");
  const head=parts[0]||"home";
  let html="";
  if(head==="home")html=V.home();
  else if(head==="learn"&&parts[1])html=V.topic(parts[1]);
  else if(head==="learn")html=V.learn();
  else if(head==="practice")html=V.practice();
  else if(head==="reference")html=V.reference();
  else if(head==="cases")html=V.cases();
  else if(head==="case"&&parts[1])html=V.case(parts[1]);
  else if(head==="deck")html=V.deck();
  else if(head==="mistakes")html=V.mistakes();
  else if(head==="mix")html=V.mix();
  else if(head==="essays")html=V.essays();
  else if(head==="train"&&parts[1])html=V.trainer(parts[1]);
  else if(head==="train")html=V.train();
  else if(head==="exam")html=V.exam();
  else if(head==="stats")html=V.stats();
  else if(head==="sheet")html=V.sheet();
  else if(head==="formula")html=V.formula();
  else if(head==="selftest")html=V.selftest();
  else html=V.home();
  const app=$("#app");app.innerHTML=html;
  renderNav();
  // post-render mounts & bindings
  if(head==="learn"&&parts[1]){
    const tab=parts[2]||"takeaways";
    if(tab==="explore")mountExplore(parts[1]);
    if(tab==="calculate")mountCalc(parts[1]);
    if(tab==="concepts")mountMCQ(parts[1]);
    if(tab==="case")mountCase();
  }
  if(head==="case"&&parts[1])mountCase();
  if(head==="deck")mountDeck();
  if(head==="mistakes")mountMistakes();
  if(head==="mix")mountMix();
  if(head==="train"&&parts[1])mountTrain(parts[1]);
  if(head==="exam")mountExam();
  if(head==="stats")mountStats();
  if(head==="sheet")mountSheet();
  if(head==="essays"){const ks=Object.keys(ESSAYS);mountEssay(ks[0]);const pick=$("#essaypick");if(pick)pick.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{pick.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");mountEssay(b.dataset.k);});}
  if(head==="home"){const ed=$("#examdate");if(ed)ed.onchange=()=>{Store.update(s=>s.examDate=ed.value);route();};}
  app.focus();
}

/* ---------- Bootstrap ---------- */
function initTheme(){const t=localStorage.getItem(TKEY)||"dark";document.documentElement.setAttribute("data-theme",t);const b=$("#theme");b.setAttribute("aria-pressed",t==="light");b.onclick=()=>{const nt=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";document.documentElement.setAttribute("data-theme",nt);try{localStorage.setItem(TKEY,nt);}catch(e){}b.setAttribute("aria-pressed",nt==="light");};}
window.addEventListener("hashchange",route);
document.addEventListener("DOMContentLoaded",()=>{initTheme();if(!location.hash)location.hash="#/home";route();});

return {CFMath,SelfTest,Templates,route};
})();
window.App=App;
